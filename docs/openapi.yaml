info:
  title: EstetoOne API
  description: REST API for EstetoOne (telehealth platform). All routes are
    prefixed with `/v1` unless noted. Authenticate with Bearer JWT; refresh
    tokens are issued as HttpOnly `refresh_token` cookies.
  version: 1.0.0
  contact: {}
tags: []
servers:
  - url: http://localhost:3000/v1
    description: Local development
components:
  securitySchemes:
    access-token:
      scheme: bearer
      bearerFormat: JWT
      type: http
      in: header
    cookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly refresh token cookie (login/register/refresh)
    stripe-signature:
      type: apiKey
      in: header
      name: stripe-signature
  schemas:
    LivenessResponseDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp
    HealthResponseDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        db:
          type: string
          enum:
            - up
            - down
        redis:
          type: string
          enum:
            - up
            - down
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - db
        - redis
        - timestamp
    ValidateRegistrationDto:
      type: object
      properties: {}
    RegisterDto:
      type: object
      properties: {}
    AuthUserDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
            - patient
            - doctor
            - admin
        name:
          type: string
      required:
        - id
        - email
        - role
    AuthResponseDto:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/AuthUserDto"
      required:
        - accessToken
        - user
    LoginDto:
      type: object
      properties: {}
    MeResponseDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
            - patient
            - doctor
            - admin
        planId:
          type: object
          nullable: true
        profile:
          type: object
          additionalProperties: true
          nullable: true
      required:
        - id
        - email
        - role
    PlanResponseDto:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        description:
          type: object
