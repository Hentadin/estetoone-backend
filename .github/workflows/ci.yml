name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estetoone
          POSTGRES_PASSWORD: estetoone_dev
          POSTGRES_DB: estetoone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U estetoone -d estetoone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://estetoone:estetoone_dev@localhost:5432/estetoone?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32chars

    steps:
      - uses: actions/checkout@v4

      - name: Validate branch model
        run: node scripts/validate-branch-model.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
